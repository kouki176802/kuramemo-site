name: Deploy Kuramemo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install project
        run: python -m pip install -e .
      - name: Test
        run: python -m unittest discover -s tests -q
      - name: Build public site
        env:
          SITE_BASE_URL: https://kuramemo-mk.com
          GA4_MEASUREMENT_ID: ${{ vars.GA4_MEASUREMENT_ID }}
          GSC_VERIFICATION: ${{ vars.GSC_VERIFICATION }}
        run: python -m trend_commerce build-site
      - name: Validate public build
        env:
          SITE_BASE_URL: https://kuramemo-mk.com
          GA4_MEASUREMENT_ID: ${{ vars.GA4_MEASUREMENT_ID }}
          GSC_VERIFICATION: ${{ vars.GSC_VERIFICATION }}
        run: python -m trend_commerce publish-check
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: output/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
